name: Documentation checks
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --offline '**/*.md'
